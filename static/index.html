<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ChatRoom</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <div id="home-screen" class="screen">
    <div class="card">
      <div class="logo">
        <span class="logo-dot"></span>
        <h1>ChatRoom</h1>
      </div>
      <p class="subtitle">Instant rooms. No signup.</p>

      <label class="field-label">Your name</label>
      <input type="text" id="username-input" placeholder="e.g. Pradyumna" maxlength="20"
             autocomplete="off" autocorrect="off" spellcheck="false">

      <button id="create-btn" class="btn primary full-width">Create a room</button>

      <div class="divider"><span>or join with a code</span></div>

      <div class="join-row">
        <input type="text" id="join-code-input" placeholder="ABC123" maxlength="6"
               class="code-input" autocomplete="off" autocorrect="off"
               autocapitalize="characters" spellcheck="false">
        <button id="join-btn" class="btn">Join</button>
      </div>
    </div>
  </div>

  <div id="chat-screen" class="screen hidden">
    <header class="chat-header">
      <div class="room-info">
        <span class="room-label">Room</span>
        <span id="room-code-display"></span>
      </div>
      <div class="header-actions">
        <button id="copy-link-btn" class="btn small icon-btn" aria-label="Copy link">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <rect x="5" y="5" width="9" height="9" rx="2"/>
            <path d="M11 5V3a2 2 0 00-2-2H3a2 2 0 00-2 2v6a2 2 0 002 2h2"/>
          </svg>
          <span id="copy-label">Share</span>
        </button>
      </div>
    </header>

    <div id="messages" class="messages" role="log" aria-live="polite"></div>

    <footer class="chat-footer">
      <input type="text" id="msg-input" placeholder="Message..." autocomplete="off"
             autocorrect="off" spellcheck="false">
      <button id="send-btn" class="btn send-btn" aria-label="Send">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2L9 14L7 9L2 7L14 2Z"/>
        </svg>
      </button>
    </footer>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
